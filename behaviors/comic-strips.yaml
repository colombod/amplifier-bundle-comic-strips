bundle:
  name: comic-strips-behavior
  version: 1.0.0
  description: Comic strip creation agents and visual storytelling capabilities

agents:
  include:
    - comic-strips:style-curator
    - comic-strips:storyboard-writer
    - comic-strips:character-designer
    - comic-strips:panel-artist
    - comic-strips:cover-artist
    - comic-strips:strip-compositor

recipes:
  session-to-comic:
    path: comic-strips:recipes/session-to-comic.yaml

tools:
  - module: tool-comic-create
    source: git+https://github.com/colombod/amplifier-bundle-comic-strips@main#subdirectory=modules/tool-comic-create
  - module: tool-comic-assets
    source: git+https://github.com/colombod/amplifier-bundle-comic-strips@main#subdirectory=modules/tool-comic-assets
  - module: tool-skills
    source: git+https://github.com/microsoft/amplifier-module-tool-skills@main
    config:
      skills:
        - "git+https://github.com/colombod/amplifier-bundle-comic-strips@main#subdirectory=skills"
# NOTE: tool-comic-image-gen is NOT exposed to agents. generate_image is an
# internal implementation detail of comic_create (tool-comic-create). The
# tool-comic-image-gen module remains as a code dependency but is not
# registered in the tool surface.
