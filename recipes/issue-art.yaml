name: "issue-art"
description: "Per-issue art generation sub-recipe — generates panels, cover, and assembles final comic strip HTML for a single issue. Invoked by the parent session-to-comic recipe's Stage 3 foreach."
version: "1.0.0"
author: "amplifier-comic-strips"
tags: ["comic", "art-generation", "sub-recipe", "saga"]

# Context variables passed from the parent recipe's foreach invocation:
#   project_id          — comic project identifier
#   issue_id            — issue identifier within the project
#   issue_number        — human-readable issue number (e.g. 1, 2, 3)
#   issue_storyboard    — parsed storyboard JSON with panel_list, title, subtitle, etc.
#   character_uris      — list of comic:// URI strings for designed characters
#   style_uri           — comic:// URI for the style guide
#   style               — style name (e.g. "manga", "superhero")
#   output_name         — output filename for the assembled comic
#   saga_context        — saga metadata (previous issue recap, continuity notes)
#   content_policy_notes — accumulated moderation lessons from earlier generation attempts

context:
  project_id: ""
  issue_id: ""
  issue_number: ""
  issue_storyboard:
    title: ""
    subtitle: ""
    panel_list: []
    panel_count: 0
    page_layouts: []
    character_list: []
  character_uris: []
  style_uri: ""
  style: ""
  output_name: ""
  saga_context: {}
  content_policy_notes: ""

stages:
  - name: "issue-art-generation"
    steps:
      # ============================================
      # STEP 1: PANEL ART GENERATION (foreach per panel)
      # Iterates over each panel in the issue storyboard,
      # generating artwork with self-review and retry.
      # ============================================
      - id: "generate-panels"
        foreach: "{{issue_storyboard.panel_list}}"
        as: panel_item
        agent: "comic-strips:panel-artist"
        parallel: 2
        max_iterations: 60
        retry:
          max_attempts: 2
          initial_delay: 5
        prompt: |
          Project tracking: project_id={{project_id}}, issue_id={{issue_id}}, style={{style}}

          Generate the artwork for a single comic panel using comic_create.

          Panel to generate:
          {{panel_item}}

          Character URIs (for visual consistency — pass these directly to comic_create):
          {{character_uris}}

          Style Guide URI: {{style_uri}}
          Load the style guide using: comic_style(action='get', uri='{{style_uri}}')

          Call:
          comic_create(action='create_panel',
                       project='{{project_id}}',
                       issue='{{issue_id}}',
                       name=<panel-name-slug from panel_item>,
                       prompt=<scene description from panel_item informed by style guide>,
                       character_uris=<list of URIs from {{character_uris}} whose characters appear in this panel>,
                       size=<use panel_item.aspect_ratio if present, otherwise map panel_item.size: wide/standard->landscape, tall->portrait, square->square>,
                       camera_angle=<framing hint from panel_item>)

          After generating, self-review using:
          comic_create(action='review_asset',
                       uri=<returned panel URI>,
                       prompt="Are faces visible and unobstructed? Is there a clear focal point? Does it tell the story visually? Does it match the style?",
                       reference_uris=<character URIs from character_uris for consistency check>)

          If the review fails (passed=false), regenerate with an adjusted prompt (max 3 attempts).

          Return ONLY the panel URI string from the final successful comic_create response
          (e.g., "comic://proj/issues/issue-001/panels/panel_03").
          Do NOT return JSON objects, image paths, or base64 data.

          Content Policy Notes (accumulated from earlier stages):
          {{content_policy_notes}}
          If content_policy_notes is non-empty, these are LESSONS FROM MODERATION BLOCKS
          on earlier images in this same comic. Apply them to ALL your prompts immediately.
          Do not repeat patterns that were already blocked.

          CONTENT POLICY ACCUMULATION: If you encounter a moderation block during generation,
          include a "content_policy_lesson" field in your return JSON with a brief description
          of what was blocked and why, so later panels can avoid the same pattern.

          Example return JSON with content_policy_lesson:
          {"index": 3, "uri": "comic://...", "version": 1, "size": "landscape", "attempts": 2, "passed_review": true, "flagged": false, "content_policy_lesson": "Close-up combat scenes with energy blasts blocked — use wide establishing shots with dramatic poses instead."}

          If no moderation block occurred, omit the content_policy_lesson field or set it to null.
        collect: "panel_results"
        timeout: 1800  # 30m per panel — image gen + vision review + up to 3 retries + cross-provider fallback

      # ============================================
      # STEP: INSPECT FLAGGED PANELS
      # Scans panel_results for any panels that were
      # flagged during generation (e.g. moderation,
      # quality issues) and surfaces a summary report
      # before downstream steps consume the results.
      # ============================================
      - id: "inspect-flagged-panels"
        depends_on: ["generate-panels"]
        agent: "comic-strips:style-curator"
        model_role: fast
        prompt: |
          Scan the panel_results collected from the generate-panels step and identify
          any entries where flagged: true.

          Panel results to inspect:
          {{panel_results}}

          For each panel result, check whether it contains a flagged: true marker
          (indicating moderation blocks, quality failures, or content policy issues
          during generation).

          Return a JSON object with exactly these fields:
          - total_panels: total number of panels in panel_results
          - flagged_count: number of panels with flagged: true
          - flagged_panels: list of objects with uri and index for each flagged panel
          - warning: a human-readable summary string describing the flagged panels
            (e.g. "2 of 8 panels were flagged during generation: panels 3 and 7")

          If no panels are flagged, return flagged_count: 0, flagged_panels: [],
          and warning: "No panels were flagged during generation."
        output: "flagged_panel_report"
        parse_json: true
        timeout: 300  # 5m — lightweight scan of panel metadata

      # ============================================
      # STEP: VALIDATE AND FIX LAYOUTS
      # Counts actual panels in panel_results and
      # compares against page_layouts panel assignments.
      # Corrects layout if counts diverge, ensuring
      # every generated panel lands on a page.
      # ============================================
      - id: "validate-and-fix-layouts"
        depends_on: ["inspect-flagged-panels"]
        agent: "comic-strips:style-curator"
        model_role: fast
        prompt: |
          You are validating and correcting the page layout assignments for this comic issue.

          Count the actual panels available from panel_results:
          {{panel_results}}

          Compare against the panel_list page assignments from the storyboard:
          {{issue_storyboard.panel_list}}

          Current page_layouts from the storyboard:
          {{issue_storyboard.page_layouts}}

          Steps:
          1. Count the total number of panels in panel_results.
          2. Count the total number of panels assigned across all pages in
             issue_storyboard.page_layouts.
          3. If the counts differ, correct the page_layouts so that every panel in
             panel_results is assigned to a page — redistribute panels evenly or
             follow the original layout intent as closely as possible.
          4. Call:
             comic_create(action='validate_storyboard',
                          page_layouts=<corrected or original page_layouts>,
                          panel_list=<issue_storyboard.panel_list>)
          5. Return the corrected page_layouts (or the original if no correction was needed).

          Return a JSON object with exactly these fields:
          - page_layouts: the validated (and possibly corrected) page layout list
          - panel_count_expected: number of panels in issue_storyboard.page_layouts
          - panel_count_actual: number of panels in panel_results
          - correction_applied: true if any layout correction was made, false otherwise
          - notes: brief description of what was checked and any corrections made
        output: "layout_validation"
        parse_json: true
        timeout: 300  # 5m — lightweight validation and layout correction

      # ============================================
      # STEP 2: COVER ART GENERATION
      # Runs in PARALLEL with panels (no dependencies).
      # Generates cover art with self-review and retry.
      # ============================================
      - id: "generate-cover"
        agent: "comic-strips:cover-artist"
        depends_on: []
        retry:
          max_attempts: 2
          initial_delay: 5
        prompt: |
          Project tracking: project_id={{project_id}}, issue_id={{issue_id}}, style={{style}}

          You are generating cover art for issue #{{issue_number}} using comic_create.

          Style Guide URI: {{style_uri}}
          Load the style guide using: comic_style(action='get', uri='{{style_uri}}')

          Storyboard (for cover concept — title, theme, key characters):
          {{issue_storyboard}}

          Character URIs (pass featured characters directly to comic_create):
          {{character_uris}}

          Call:
          comic_create(action='create_cover',
                       project='{{project_id}}',
                       issue='{{issue_id}}',
                       prompt=<dramatic cover concept: main characters, pose, setting, tone>,
                       character_uris=<list of featured character URIs from {{character_uris}}>,
                       title='{{issue_storyboard.title}}',
                       subtitle='{{issue_storyboard.subtitle}}')

          After generating, self-review using:
          comic_create(action='review_asset',
                       uri=<returned cover URI>,
                       prompt="Are main characters in a dramatic pose with faces visible? Is the composition striking? Does it match the style?",
                       reference_uris=<character URIs from {{character_uris}}>)

          If the review fails (passed=false), regenerate with an adjusted prompt (max 3 attempts).

          Return ONLY the cover URI string from the final successful comic_create response
          (e.g., "comic://proj/issues/issue-001/covers/cover").
          Do NOT return HTML, base64 data, or image paths.

          Content Policy Notes (from earlier pipeline stages):
          {{content_policy_notes}}
          If content_policy_notes is non-empty, these are LESSONS FROM EARLIER MODERATION BLOCKS.
          Apply them to your prompt immediately — do not repeat blocked patterns.

          IMPORTANT: If cover generation fails after all attempts (including moderation blocks),
          return ONLY the text "COVER_GENERATION_FAILED" — do not return a URI.
        output: "cover_results"
        timeout: 1800  # 30m — image gen + vision review + up to 3 retries + composition-biased model selection

      # ============================================
      # STEP: REVIEW PANEL COMPOSITIONS
      # Pre-computes character positions and overlay
      # placement for each panel before final assembly.
      # Makes bubble positioning deterministic and
      # reviewable in recipe approval gates.
      # ============================================
      - id: "review-panel-compositions"
        depends_on: ["inspect-flagged-panels"]
        foreach: "{{panel_results}}"
        as: panel_uri
        agent: "comic-strips:strip-compositor"
        retry:
          max_attempts: 2
          initial_delay: 3
        prompt: |
          Project tracking: project_id={{project_id}}, issue_id={{issue_id}}

          Review a single panel image to determine optimal text overlay placement.

          Panel URI: {{panel_uri}}

          Character URIs (for visual reference):
          {{character_uris}}

          Style Guide URI: {{style_uri}}
          Load layout conventions using: comic_style(action='get', uri='{{style_uri}}')

          Storyboard panel data (for matching characters to dialogue):
          {{issue_storyboard.panel_list}}

          Call:
          comic_create(action='review_asset',
                       uri='{{panel_uri}}',
                       prompt="Analyze this comic panel for text overlay placement. Describe: (1) Character positions — which characters appear and where (left/right/center, upper/lower third). (2) Negative space — regions with no important visual content suitable for speech bubbles and captions. (3) Focal point — where the viewer's eye is drawn. (4) Suggested overlay placements — for each character's speech bubble and any narrator caption box, provide coordinates as x, y, width, height (0-100 percentages of panel dimensions).",
                       reference_uris=<character URIs from {{character_uris}} whose characters appear in this panel>)

          Return a JSON object with these fields:
          - panel_uri: "{{panel_uri}}"
          - characters_detected: [{name, position_x, position_y, facing}]
          - overlay_suggestions: [{type: "speech"|"caption"|"sfx", target_character, x, y, width, height}]
          - negative_space_regions: [{x, y, width, height, description}]
          - composition_notes: brief description of the visual layout
        collect: "panel_reviews"
        timeout: 900  # 15m per panel — vision model inference on image + detailed spatial analysis

      # ============================================
      # STEP 3: COMPOSITION — Final Assembly
      # Assembles the complete comic strip HTML from
      # panel URIs, cover URI, storyboard, and style.
      # Handles saga-specific elements (recap blocks,
      # "To Be Continued" teases).
      # ============================================
      - id: "composition"
        agent: "comic-strips:strip-compositor"
        depends_on: ["review-panel-compositions", "generate-cover", "validate-and-fix-layouts"]
        prompt: |
          Project tracking: project_id={{project_id}}, issue_id={{issue_id}}, style={{style}}

          Assemble the final comic strip HTML from URIs using comic_create.

          Panel URIs (in order):
          {{panel_results}}

          Pre-computed panel composition reviews (character positions and overlay placement):
          {{panel_reviews}}

          Cover URI:
          {{cover_results}}
          If cover_results is "COVER_GENERATION_FAILED", omit the cover page from the layout
          and proceed with panel assembly only. Do not fail the composition.

          Storyboard (for dialogue, captions, sound effects per panel):
          {{issue_storyboard}}

          Validated Page Layouts (corrected panel-to-page assignments — use these for page structure):
          {{layout_validation.page_layouts}}

          Style Guide URI: {{style_uri}}
          Load layout conventions using: comic_style(action='get', uri='{{style_uri}}')

          Output filename: {{output_name}}

          Saga Context:
          {{saga_context}}

          WORKFLOW:
          1. Load the style guide to understand layout conventions, bubble styles, and page structure.
          2. If saga_context is non-empty and this is NOT issue #1:
             - Add a "Previously in..." recap text block on the first story page summarizing
               the previous issue's key events from saga_context.
          3. For each panel, use the pre-computed review data from {{panel_reviews}} to determine
             character positions, available negative space, and optimal overlay coordinates.
             Each review contains: characters_detected, overlay_suggestions, negative_space_regions,
             and composition_notes. Use these directly for precise text overlay placement.
             Do NOT call review_asset again — the reviews are already computed by the previous step.
          4. Build a layout object mapping each panel URI to its storyboard dialogue, captions,
             and sound effects. Use {{layout_validation.page_layouts}} for page structure and
             panel-to-page assignments. Use overlay coordinates (0-100% of panel dimensions)
             informed by the visual composition analysis.
          5. If saga_context is non-empty and saga_context indicates more issues follow:
             - Add a "To Be Continued..." tease panel or text block at the end of the last
               story page, hinting at the next issue's conflict or cliffhanger.
          6. Call:
             comic_create(action='assemble_comic',
                          project='{{project_id}}',
                          issue='{{issue_id}}',
                          output_path=<output filename>,
                          style_uri='{{style_uri}}',
                          layout={
                            "title": "{{issue_storyboard.title}}",
                            "cover": {"uri": "{{cover_results}}", "title": "{{issue_storyboard.title}}",
                                      "subtitle": "{{issue_storyboard.subtitle}}", "branding": "AmpliVerse"},
                            "pages": [<pages with panel URIs, shapes, and text overlays>]
                          })

          The tool handles all base64 encoding, SVG bubble rendering, and HTML assembly internally.
          Do NOT fetch image bytes or call base64 encoding tools.

          Do NOT delete intermediate files. All assets are managed by the asset manager.

          Content Policy Notes: {{content_policy_notes}}
        output: "final_output"
        timeout: 3600  # 1h — load style + build layout for 20+ panels + saga context + HTML assembly
