name: "session-to-comic"
description: "Transform an Amplifier session into an illustrated comic strip with quality review, character consistency, dramatized storytelling, and AmpliVerse publisher branding"
version: "8.0.0"
author: "amplifier-comic-strips"
tags: ["comic", "visual-storytelling", "session-analysis", "uri-protocol"]

# =============================================================================
# CHANGELOG
# =============================================================================
#
# v8.0.0 (2026-03-06):
#   - FEAT: Restructure init-project for saga support. Creates project +
#     placeholder first issue instead of project + issue. Metadata uses
#     max_issues instead of saga_issue/previous_issue_id. Default issue
#     title changed from 'Comic Strip' to 'Saga Planning'.
#   - FEAT: Smart project naming in discover-sessions. When project_name is
#     empty or default 'comic-project', proposes a meaningful name based on
#     discovered content, stored as 'suggested_project_name' in research output.
#
# v7.7.0 (2026-03-06):
#   - FEAT: Add flexible source input. New context variable `source` accepts
#     project names, session IDs, file paths, descriptive phrases, or any
#     combination. The stories:story-researcher agent discovers and consolidates
#     session data using its native tools (git/gh CLI, grep, delegation).
#   - FEAT: Add discover-sessions step (Step 0a) between init-project and
#     research. Resolves {{source}} to consolidated session data stored as a
#     comic asset. Returns a comic:// URI consumed by the research step.
#   - CHANGE: research step now consumes {{session_data}} URI from the discover
#     step instead of reading {{session_file}} directly. Research loads
#     pre-gathered data via comic_asset(action='get').
#   - CHANGE: session_file context variable deprecated. Still accepted as a
#     backward-compatible alias — if source is empty and session_file is
#     provided, the discover step uses session_file instead.
#   - CHANGE: init-project metadata now includes source alongside session_file.
#
# v7.6.0 (2026-03-05):
#   - FEAT: Add validate-storyboard recipe step (deterministic layout ID check).
#     Runs immediately after storyboard generation, BEFORE the approval gate.
#     Catches invalid layout IDs (e.g. agent-invented names like "naruto_wide_3")
#     before any expensive image generation starts. Returns suggestions for valid
#     alternatives so the reviewer can deny and fix.
#   - FEAT: Approval gate now shows layout validation results and page_layouts.
#   - FEAT: comic_create gains list_layouts and validate_storyboard actions.
#     list_layouts returns all 47 templates grouped by panel count.
#     validate_storyboard checks page_layouts array against the template dict.
#   - FIX: assemble_comic now validates layout IDs before rendering. Invalid IDs
#     return an error with suggestions instead of silently falling back to 2x2.
#   - FIX: _grid_css() logs a warning on unknown layout_id fallback (defense-in-depth).
#
# v7.5.0 (2026-03-04):
#   - FEAT: Add story_hints and character_hints context variables. Users can now
#     pass creative direction hints (e.g. "emphasize the human feedback loop",
#     "make the protagonist look like a weary traveler") that flow through the
#     recipe to storyboard-writer and character-designer respectively.
#   - FEAT: storyboard-writer now receives and applies story_hints to narrative
#     arc selection, tone, and panel emphasis during both Phase 1 and Phase 2.
#   - FEAT: character-designer now receives and applies character_hints to visual
#     design, personality expression, and style interpretation.
#   - FIX: Character style cohesion — character-designer now includes an explicit
#     "style cohesion directive" in every prompt referencing the style guide's
#     Character Rendering section. All characters in an issue must share the same
#     visual DNA (face proportions, rendering technique, line quality) so they
#     look like they belong in the same world. Previously characters could drift
#     into different sub-styles (e.g. some Ghibli characters looking modern while
#     others looked classic).
#   - FIX: style-curator predefined styles table expanded from 6 to all 28 named
#     style packs. Previously only manga/superhero/indie/newspaper/ligne-claire/
#     retro-americana had explicit read_file mappings; the other 22 (sin-city,
#     ghibli, watchmen, etc.) fell through to custom generation, ignoring their
#     authored style pack files.
#
# v7.4.0 (2026-03-03):
#   - FIX: Enforce no-speech-bubbles at code level — _create_panel and
#     _create_cover now append "Do not include any text, speech bubbles..."
