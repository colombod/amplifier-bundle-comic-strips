name: "session-to-comic"
description: "Transform an Amplifier session into an illustrated comic strip with quality review, character consistency, dramatized storytelling, and AmpliVerse publisher branding"
version: "6.0.0"
author: "amplifier-comic-strips"
tags: ["comic", "visual-storytelling", "session-analysis", "image-generation"]

# =============================================================================
# CHANGELOG
# =============================================================================
#
# v6.0.0 (2026-03-03):
#   - FEAT: Integrate comic asset manager (tool-comic-assets) for all asset tracking.
#     All agents now store and retrieve assets through comic_project, comic_character,
#     comic_asset, and comic_style tools instead of direct filesystem operations.
#   - FEAT: Add init-project step that creates project and issue for asset tracking.
#     project_id and issue_id flow through recipe context to all downstream steps.
#   - FEAT: Character designs stored as composite domain objects (metadata + images)
#     in the project roster, versioned by style, reusable across issues.
#   - FEAT: Style guides stored and retrievable across projects.
#   - FEAT: Review feedback stored as version metadata on panels, covers, characters.
#   - CHANGE: strip-compositor no longer deletes intermediate files. All assets
#     persist in managed storage. Cleanup is an explicit user-approved operation.
#   - CHANGE: bash tool removed from cover-artist. Base64 encoding handled by
#     asset manager's format='data_uri' retrieval.
#
# v5.0.3 (2026-03-01):
#   - BUGFIX: Remove unsupported Jinja2 filter `| length` from approval gate prompt.
#     ROOT CAUSE: substitute_variables() does not support Jinja2 filter syntax;
#     `{{storyboard.character_list | length}}` was rendered as literal text instead
#     of being substituted. Replaced with plain "Characters:" heading — the list
#     itself follows on the next line so reviewers see the count implicitly.
#   - IMPROVEMENT: Move parallel:/max_iterations: to after agent: in both foreach
#     steps (design-characters, generate-panels). Field order now reads naturally
#     as: what to loop → what agent → how to execute.
#
# v5.0.2 (2026-03-01):
#   - FIX: Add parse_json: true to design-characters and generate-panels collect
#     steps so character_sheet and panel_results are parsed objects, not raw strings.
#   - FIX: Replace {{storyboard}} in approval gate with named field references
#     for human-readable review output.
#   - FEAT: Add parallel: 2 to both foreach steps for bounded concurrent execution.
#   - FEAT: Add max_iterations: 6 (characters) and 12 (panels) as hard guards
#     against runaway loops in the expensive art-generation stage.
#
# v5.0.1 (2026-03-01):
#   - FIX: Add parse_json: true to storyboard step so output is parsed as
#     a JSON object, enabling dot-notation access to character_list and panel_list.
#   - FIX: Change foreach sources from {{character_list}}/{{panel_list}} to
#     {{storyboard.character_list}}/{{storyboard.panel_list}} (dot notation).
#   - FIX: Change item_variable: to as: in both foreach steps (correct schema field).
#
# v5.0.0 (2026-03-01):
#   - FEAT: Replace monolithic character-design step with foreach loop.
#     The storyboard-writer now emits character_list and panel_list arrays.
#     character-designer is invoked once per character via foreach, collecting
#     results into character_sheet.
#   - FEAT: Replace monolithic generate-panels step with foreach loop.
#     panel-artist is invoked once per panel via foreach, collecting
#     results into panel_results.
#   - This enables parallel/incremental image generation and better
#     error isolation per character/panel.
#
# v4.0.4 (2026-02-28):
#   - FIX: Flatten requirements further to individual typed keys instead of
#     packed comma-separated strings. Each requirement is now its own context
#     variable with proper YAML types (bool/string) instead of a single
#     string like "needs_reference_images=false, detail_level=high".
#     This gives agents direct access to typed values via template vars.
#
# v4.0.3 (2026-02-28):
#   - FIX: Flatten nested context dicts to avoid recipe engine runtime crash.
#     The recipe engine's substitute_variables() converts nested dicts to
#     strings before prompt substitution. When a prompt references
#     {{requirements.character_design}}, the engine first stringifies the
#     parent "requirements" dict, then tries .get("character_design") on
#     the resulting string → 'str' object has no attribute 'get'.
#     WORKAROUND: Replace nested requirements dict with flat string vars
#     (character_design_requirements, panel_generation_requirements,
#     cover_generation_requirements) and update prompt references.
#     Filed engine bug as amplifier-support#91 for proper staged recipe
#     validation.
#
# v4.0.0-v4.0.2: Prior iterations exploring nested vs flat context.
#   See amplifier-support#91 for full history.
#
# v4.0.0:
#   - Initial v4 staged recipe with approval gate between storyboard review
#     and expensive art generation. Two stages: research-and-storyboard
#     (text-only, cheap) and art-generation (image generation, expensive).
#

# Usage:
#   amplifier run "execute session-to-comic with session_file=~/.amplifier/sessions/2026-02-27/events.jsonl style=superhero"
#   amplifier run "execute session-to-comic with session_file=./my-session.jsonl style=manga output_name=my-comic"

context:
  session_file: ""        # Required: path to events.jsonl session file or session ID
  style: "superhero"      # Style name (manga, superhero, indie, newspaper, ligne-claire, retro-americana) or custom description
  output_name: ""         # Optional: custom output filename (defaults to comic-{timestamp})
  project_name: ""     # Optional: project name (defaults to "comic-project")
  issue_title: ""      # Optional: issue title (defaults to comic title from research)
  # Pipeline step requirements for generate_image tool parameters.
  # Flattened to individual keys to avoid nested dict serialization issues
  # in the recipe engine's substitute_variables() (see amplifier-support#91).
  character_design_needs_reference_images: false
  character_design_detail_level: "high"
  generate_panels_needs_reference_images: true
  generate_panels_detail_level: "medium"
  generate_cover_needs_reference_images: true
  generate_cover_detail_level: "high"

stages:
  # ==========================================================================
  # STAGE 1: RESEARCH & STORYBOARD
  # Cheap text-only steps: extract data, curate style, write storyboard.
  # Approval gate at the end lets the user review character cast and narrative
  # arc before committing to expensive image generation.
  # ==========================================================================
  - name: "research-and-storyboard"
    steps:
      # ============================================
      # STEP 0: INIT PROJECT - Asset Manager Setup
      # ============================================
      - id: "init-project"
        agent: "comic-strips:style-curator"
        prompt: |
          Initialize the comic project for asset tracking.

          comic_project(action='create_issue', project='{{project_name}}', title='{{issue_title}}')

          If project_name is empty, use "comic-project" as the default.
          If issue_title is empty, use "Comic Strip" as the default.

          Return the project_id and issue_id from the response as JSON:
          {"project_id": "<value>", "issue_id": "<value>"}
        output: "project_init"
        parse_json: true
        timeout: 60

      # ============================================
      # STEP 1: RESEARCH - Data Extraction
      # ============================================
      - id: "research"
        agent: "stories:story-researcher"
        prompt: |
          Analyze the Amplifier session at: {{session_file}}

          Extract structured data for comic strip creation:

          **Session Metadata:**
          - Session ID, duration, date
          - Agents used and their roles
          - Tools called and frequency
          - Number of user interactions

          **Agent Activity Analysis (CRITICAL for character selection):**
          - Rank each agent by activity level: count tool calls, delegations sent, delegations received
          - Identify which bundle each agent belongs to (e.g., foundation:explorer -> foundation bundle)
          - Map bundle memberships so the storyboard writer can assign team affiliations
          - Flag the top 3-4 most active agents and note their key contributions

          **Key Moments (for comic panels):**
          - The initial challenge or goal (what started the session?)
          - Breakthrough moments (problems solved, discoveries made)
          - Agent collaboration highlights (which agents worked together?)
          - The final outcome or deliverable
          - Any dramatic failures or unexpected turns

          **Characters:**
          - Map each agent to a character with a brief visual description
          - Identify the "protagonist" (main agent driving the story)
          - Identify any "antagonists" (bugs, errors, blockers)

          **Metrics:**
          - Quantified achievements (files created, tests passed, etc.)
          - Session duration and effort indicators

          Output as structured JSON with: title, subtitle, timeline, key_moments, characters, metrics, outcome.

          Project tracking: project_id={{project_init.project_id}}, issue_id={{project_init.issue_id}}
          If the comic_asset tool is available, store it using:
          comic_asset(action='store', project='{{project_init.project_id}}', issue='{{project_init.issue_id}}', type='research', name='research', content=<your research output>)
        output: "research_data"
        timeout: 600

      # ============================================
      # STEP 2: STYLE CURATION
      # ============================================
      - id: "style-curation"
        agent: "comic-strips:style-curator"
        prompt: |
          Define the visual style for this comic strip.

          Style requested: {{style}}

          Research data (for context about the story):
          {{research_data}}

          If "{{style}}" matches a predefined style name (manga, superhero, indie, newspaper, ligne-claire, retro-americana), load the corresponding style pack and adapt it for this specific story.

          If it's a custom description, interpret it and generate a complete style guide.

          Output the full structured style guide.

          Project tracking: project_id={{project_init.project_id}}, issue_id={{project_init.issue_id}}, style={{style}}
          After producing the style guide, store it using:
          comic_style(action='store', project='{{project_init.project_id}}', issue='{{project_init.issue_id}}', name='{{style}}', definition=<your style guide output>)
        output: "style_guide"
        timeout: 300

      # ============================================
      # STEP 3: STORYBOARD
      # ============================================
      - id: "storyboard"
        agent: "comic-strips:storyboard-writer"
        prompt: |
          Create a panel-by-panel storyboard for this comic strip.

          Research Data:
          {{research_data}}

          Style Guide:
          {{style_guide}}

          IMPORTANT: You are a TWO-PHASE agent.

          **Phase 1 — Delegate Narrative Creation:**
          First, delegate to stories:content-strategist with the research data to select
          the best narrative arc (problem/solution/impact, journey/discovery, etc.).
          Then delegate to stories:case-study-writer with the arc and research data to
          generate Challenge → Approach → Results narrative prose.

          **Phase 2 — Translate to Comic:**
          Take the narrative prose from Phase 1 and translate it into comic panels.
          Select 3-4 main characters (most active agents) + 1-2 supporting (one key moment).
          Do NOT create more than 6 characters total. Do NOT include every agent mentioned.

          All dialogue must be natural, dramatized character speech. NO raw session data
          (UUIDs, file paths, file sizes, token counts, raw error messages) in speech bubbles.
          Use caption boxes for factual anchors. Technical events become visual metaphors.

          Set page breaks every 3-5 panels, after dramatic beats.

          Break the story into 4-8 panels following the style guide's conventions.

          CRITICAL OUTPUT REQUIREMENT: Your JSON output MUST include these top-level fields:
          - title: string (comic title)
          - subtitle: string (comic subtitle)
          - panel_count: integer (total number of panels)
          - character_list: array of character objects (one entry per character to be designed)
          - panel_list: array of panel objects (one entry per panel to be generated)
          These arrays will be used by downstream foreach loops to drive character design
          and panel art generation. Each character_list entry should contain all info needed
          to design that character. Each panel_list entry should contain all info needed to
          generate that panel's artwork.

          Output the complete panel sequence as structured JSON.

          Project tracking: project_id={{project_init.project_id}}, issue_id={{project_init.issue_id}}
          After producing the storyboard JSON, store it using:
          comic_asset(action='store', project='{{project_init.project_id}}', issue='{{project_init.issue_id}}', type='storyboard', name='storyboard', content=<your storyboard output>)
        output: "storyboard"
        parse_json: true
        timeout: 1200

    # ------------------------------------------------------------------
    # APPROVAL GATE: Storyboard Review
    # This is the last cheap checkpoint before expensive image generation.
    # The user can review the character cast and narrative arc, then
    # approve to proceed or deny to stop and revise.
    # ------------------------------------------------------------------
    approval:
      required: true
      prompt: |
        Storyboard complete. Please review the character cast and narrative arc
        before approving expensive image generation.

        Title: {{storyboard.title}}
        Subtitle: {{storyboard.subtitle}}
        Panel count: {{storyboard.panel_count}}

        Characters:
        {{storyboard.character_list}}

        Panels overview:
        {{storyboard.panel_list}}

        Approve to proceed with character design and panel art generation.
        Deny to stop and revise the storyboard.
      timeout: 0
      default: "deny"

  # ==========================================================================
  # STAGE 2: ART GENERATION & COMPOSITION
  # Expensive image generation steps: character sheets, panel art, cover art,
  # and final HTML assembly with QA.
  # ==========================================================================
  - name: "art-generation"
    steps:
      # ============================================
      # STEP 4: CHARACTER DESIGN - Reference Sheets (foreach per character)
      # ============================================
      - id: "design-characters"
        foreach: "{{storyboard.character_list}}"
        as: character_item
        agent: "comic-strips:character-designer"
        parallel: 2
        max_iterations: 6
        prompt: |
          Project tracking: project_id={{project_init.project_id}}, issue_id={{project_init.issue_id}}, style={{style}}

          Create a character reference sheet for this single character.

          Character to design:
          {{character_item}}

          Style Guide:
          {{style_guide}}

          Pipeline requirements: needs_reference_images={{character_design_needs_reference_images}}, detail_level={{character_design_detail_level}}

          Design this character with bundle-affiliation visual markers -- characters from the
          same bundle share team colors, insignia, or uniform elements.

          Output a structured character entry with image path and description for this character.
        collect: "character_sheet"
        parse_json: true
        timeout: 900

      # ============================================
      # STEP 5a: ART GENERATION - Panel Art (foreach per panel)
      # ============================================
      - id: "generate-panels"
        foreach: "{{storyboard.panel_list}}"
        as: panel_item
        depends_on: ["design-characters"]
        agent: "comic-strips:panel-artist"
        parallel: 2
        max_iterations: 12
        prompt: |
          Project tracking: project_id={{project_init.project_id}}, issue_id={{project_init.issue_id}}, style={{style}}

          Generate the artwork for a single comic panel.

          Panel to generate:
          {{panel_item}}

          Character Sheet (reference images for visual consistency):
          {{character_sheet}}

          Style Guide:
          {{style_guide}}

          Pipeline requirements: needs_reference_images={{generate_panels_needs_reference_images}}, detail_level={{generate_panels_detail_level}}

          Generate the image for this panel, then self-review it using vision.
          Check: are faces visible and unobstructed? Is there a clear focal point?
          Does it tell the story visually? Does it match the style?
          ALWAYS pass reference_images from the character sheet for consistency.
          If the panel fails review, regenerate with an adjusted prompt (max 3 attempts).
        collect: "panel_results"
        parse_json: true
        timeout: 1200

      # ============================================
      # STEP 5b: ART GENERATION - Cover Art
      # ============================================
      - id: "generate-cover"
        agent: "comic-strips:cover-artist"
        depends_on: ["design-characters"]
        prompt: |
          Project tracking: project_id={{project_init.project_id}}, issue_id={{project_init.issue_id}}, style={{style}}

          You are generating cover art for a comic strip.

          Pipeline requirements for this step: needs_reference_images={{generate_cover_needs_reference_images}}, detail_level={{generate_cover_detail_level}}

          Style Guide:
          {{style_guide}}

          Storyboard:
          {{storyboard}}

          Character Sheet (reference images for visual consistency):
          {{character_sheet}}

          Research Data:
          {{research_data}}

          Generate a single cover hero image and assemble cover HTML with AmpliVerse branding.
          CRITICAL: The AmpliVerse logo MUST be the ACTUAL Amplifier avatar image fetched from
          https://github.com/microsoft-amplifier.png and embedded as a base64 <img> tag.
          Do NOT use CSS text or a colored badge as a substitute.
          Self-review the cover image using vision before assembling HTML (max 3 attempts).
          Ensure main characters are in a dramatic pose with faces visible.
        output: "cover_results"
        timeout: 900

      # ============================================
      # STEP 6: COMPOSITION + QA + CLEANUP
      # ============================================
      - id: "composition"
        agent: "comic-strips:strip-compositor"
        depends_on: ["generate-panels", "generate-cover"]
        prompt: |
          Project tracking: project_id={{project_init.project_id}}, issue_id={{project_init.issue_id}}, style={{style}}

          IMPORTANT: Retrieve ALL assets from the asset manager instead of relying on recipe context variables.
          Use comic_asset, comic_character, and comic_style tools to fetch what you need.

          Assemble the final comic strip HTML.

          Panel Art Results:
          {{panel_results}}

          Cover Art Results:
          {{cover_results}}

          Storyboard (for dialogue, captions, sound effects):
          {{storyboard}}

          Character Sheet (for character intro page):
          {{character_sheet}}

          Style Guide (for layout, fonts, colors, borders):
          {{style_guide}}

          Research Data (for title and metadata):
          {{research_data}}

          Output filename: {{output_name}}

          Assemble the cover page and all panel images into a single self-contained HTML file.
          Apply speech bubbles, captions, and sound effects as CSS overlays.

          Run visual QA by delegating to browser-tester:visual-documenter with SPECIFIC criteria:
          - Cover: dramatic hero image? AmpliVerse logo as actual image (not CSS text)? Title readable?
          - Character intro: 3-6 characters displayed? Each with image, name, role?
          - Story pages: bubbles not covering faces? Natural dialogue (no UUIDs/raw data)? Visual consistency?
          - Overall: navigation works? Page count correct? Rate overall quality 1-10.

          Fix any issues found (max 2 assembly review iterations).

          Do NOT delete intermediate files. All assets are managed by the asset manager.
          Cleanup is handled separately via an explicit recipe step with user approval.
        output: "final_output"
        timeout: 1200
