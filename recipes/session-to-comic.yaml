name: "session-to-comic"
description: "Transform an Amplifier session into an illustrated comic strip with quality review, character consistency, dramatized storytelling, and AmpliVerse publisher branding"
version: "9.0.0"
author: "amplifier-comic-strips"
tags: ["comic", "visual-storytelling", "session-analysis", "uri-protocol"]

# =============================================================================
# CHANGELOG
# =============================================================================
#
# v9.0.0 (2026-03-07):
#   - BREAKING CHANGE: Refactored from 853-line monolith (3 stages, inline
#     agent steps) to thin orchestrator (flat mode, 3 sub-recipe calls).
#     Composable sub-recipes:
#       1. saga-plan.yaml         — discover, research, style, storyboard,
#          validate, create issues, approval gate
#       2. design-characters.yaml — load storyboard from asset store, character
#          reuse/dedup, foreach design loop
#       3. issue-art.yaml         — per-issue panels, cover, composition
#   - CHANGE: Switched from staged mode (stages + inline approval gates) to
#     flat mode (steps). The approval gate now lives inside saga-plan.yaml.
#   - CHANGE: All agent prompts moved into sub-recipes. Orchestrator contains
#     only type: recipe steps and context wiring.
#   - NEW: Added `force` context variable (default "false") for regeneration
#     control — passed through to saga-plan and design-characters.
#   - NEW: Added recursion config (max_depth: 3, max_total_steps: 200) for
#     composed sub-recipe execution safety.
#   - COMPAT: Same top-level context variables as v8.x. saga_issue and
#     previous_issue_id retained for backward compatibility (unused by
#     sub-recipes).
#
# v8.1.0 (2026-03-07):
#   - FEAT: Add lookup-existing-characters step between style-curation and
#     storyboard. Character discovery is now deterministic.
#
# v8.0.0 (2026-03-06):
#   - FEAT: Restructure init-project for saga support. Smart project naming.
#
# v7.7.0 (2026-03-06):
#   - FEAT: Flexible source input; discover-sessions step.
#
# v7.6.0 (2026-03-05):
#   - FEAT: Storyboard layout validation; validate_storyboard action.
#
# v7.5.0 (2026-03-04):
#   - FEAT: story_hints and character_hints context variables.
#
# v7.0.0–v7.4.0: URI-based context, research-as-asset, schema fixes.
# v4.0.0–v6.1.0: Staged recipe, asset manager, foreach loops, retries.
# Full changelog for v4.0.0–v7.4.0 available in git history.

# Usage:
#   amplifier run "execute session-to-comic with source=comic-strip-bundle style=superhero"
#   amplifier run "execute session-to-comic with source=./my-session.jsonl style=manga output_name=my-comic"
#   amplifier run "execute session-to-comic with session_file=./events.jsonl style=naruto"  # (deprecated, still works)

context:
  source: ""              # Required: project name, session ID(s), file path(s), or descriptive phrase
  session_file: ""        # Deprecated: backward-compatible alias for source (single file path)
  style: "superhero"      # 28 named styles (manga, superhero, indie, newspaper, ligne-claire, retro-americana, sin-city, watchmen, berserk, cuphead, ghibli, attack-on-titan, spider-man, x-men, solo-leveling, gundam, transformers, tatsunoko, witchblade, dylan-dog, tex-willer, disney-classic, bendy, hellraiser, naruto, jujutsu-kaisen, one-piece, go-nagai) — or any custom description
  output_name: ""         # Optional: custom output filename (defaults to comic-{timestamp})
  project_name: ""        # Optional: project name (defaults to "comic-project")
  issue_title: ""         # Optional: first issue title (defaults to "Saga Planning")
  force: "false"          # Optional: force regeneration of existing storyboard/characters ("true" to regenerate)
  saga_issue: ""          # Legacy: retained for backward compatibility (unused by sub-recipes)
  previous_issue_id: ""   # Legacy: retained for backward compatibility (unused by sub-recipes)
  max_characters: ""      # Optional: max characters to design (default 5-6)
  max_pages: ""           # Optional: max story pages per issue (default 5)
  panels_per_page: ""     # Optional: panels per page range (default "3-6")
  max_issues: "5"         # Optional: max issues in a saga (default 5)
  story_hints: ""         # Optional: creative direction for the narrative
  character_hints: ""     # Optional: creative direction for character design
  content_policy_notes: "" # Accumulated moderation lessons — populated at runtime

recursion:
  max_depth: 3
  max_total_steps: 200

steps:
  # ==========================================================================
  # STEP 1: SAGA PLANNING
  # Delegates to saga-plan.yaml: check-existing, init-project, discover
  # sessions, research, style-curation, character lookup, storyboard,
  # validation, issue creation, and an internal approval gate.
  # Output: sub-recipe's full final context dict containing project_init,
  # storyboard, style_guide, saga_issues, etc.
  # ==========================================================================
  - id: "saga-plan"
    type: "recipe"
    recipe: "saga-plan.yaml"
    context:
      source: "{{source}}"
      session_file: "{{session_file}}"
      style: "{{style}}"
      project_name: "{{project_name}}"
      issue_title: "{{issue_title}}"
      force: "{{force}}"
      max_characters: "{{max_characters}}"
      max_pages: "{{max_pages}}"
      panels_per_page: "{{panels_per_page}}"
      max_issues: "{{max_issues}}"
      story_hints: "{{story_hints}}"
      character_hints: "{{character_hints}}"
      content_policy_notes: "{{content_policy_notes}}"
    output: "saga_plan_result"
    timeout: 7200  # includes approval gate wait time

  # ==========================================================================
  # STEP 2: CHARACTER DESIGN
  # Delegates to design-characters.yaml: loads storyboard + style from the
  # asset store (no need to pass style_guide directly), searches for existing
  # characters, foreach design loop with deduplication.
  # Output: sub-recipe's full final context dict containing character_uris.
  # ==========================================================================
  - id: "design-characters"
    type: "recipe"
    recipe: "design-characters.yaml"
    context:
      project_id: "{{saga_plan_result.project_init.project_id}}"
      style: "{{style}}"
      force: "{{force}}"
    output: "design_result"
    timeout: 7200  # full roster design (~10-30 min)

  # ==========================================================================
  # STEP 3: PER-ISSUE ART GENERATION
  # Iterates over each issue from the saga plan, invoking issue-art.yaml for
  # each. Each sub-recipe generates panels, cover, and assembles the final
  # comic strip HTML for one issue.
  # on_error: continue — a failure in one issue does not block the rest.
  # ==========================================================================
  - id: "generate-issues"
    foreach: "{{saga_plan_result.storyboard.saga_plan.issues}}"
    as: current_issue
    type: "recipe"
    recipe: "issue-art.yaml"
    on_error: "continue"
    max_iterations: 20
    timeout: 7200  # per issue: panels + cover + composition (~60-120 min)
    context:
      project_id: "{{saga_plan_result.project_init.project_id}}"
      issue_id: "{{current_issue.issue_id}}"
      issue_number: "{{current_issue.issue_number}}"
      issue_storyboard: "{{current_issue}}"
      character_uris: "{{design_result.character_uris}}"
      style_uri: "{{saga_plan_result.style_guide}}"
      style: "{{style}}"
      output_name: "{{output_name}}-issue-{{current_issue.issue_number}}"
      saga_context: "{{saga_plan_result.storyboard.saga_plan}}"
      content_policy_notes: "{{content_policy_notes}}"
    collect: "issue_results"
