#   - FEAT: Image resize/compression utility — images exceeding 4MB are
#     automatically resized before being sent to vision LLM APIs. Uses
#     progressive strategy: JPEG re-encode → scale down → quality reduction.
#     Requires Pillow (best-effort: original bytes used if unavailable).
#   - CHANGE: init-project step now passes generation trigger metadata
