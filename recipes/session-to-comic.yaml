# v4.0.4 (2026-02-28):
#   - FIX: Flatten requirements further to individual typed keys instead of
#     packed comma-separated strings. Each requirement is now its own context
#     variable with proper YAML types (bool/string) instead of a single
#     string like "needs_reference_images=false, detail_level=high".
#     This gives agents direct access to typed values via template vars.
#
# v4.0.3 (2026-02-28):
#   - FIX: Flatten nested context dicts to avoid recipe engine runtime crash.
#     The recipe engine's substitute_variables() converts nested dicts to
#     strings before prompt substitution. When a prompt references
#     {{requirements.character_design}}, the engine first stringifies the
#     parent "requirements" dict, then tries .get("character_design") on
#     the resulting string → 'str' object has no attribute 'get'.
#     WORKAROUND: Replace nested requirements dict with flat string vars
#     (character_design_requirements, panel_generation_requirements,
#     cover_generation_requirements) and update prompt references.
#     Filed engine bug as amplifier-support#91 for proper staged recipe
#     validation.
#
# v4.0.0-v4.0.2: Prior iterations exploring nested vs flat context.
#   See amplifier-support#91 for full history.
#
# v4.0.0:
#   - Initial v4 staged recipe with approval gate between storyboard review
#     and expensive art generation. Two stages: research-and-storyboard
#     (text-only, cheap) and art-generation (image generation, expensive).
#

# Usage:
#   amplifier run "execute session-to-comic with source=comic-strip-bundle style=superhero"
#   amplifier run "execute session-to-comic with source=./my-session.jsonl style=manga output_name=my-comic"
#   amplifier run "execute session-to-comic with session_file=./events.jsonl style=naruto"  # (deprecated, still works)

context:
  source: ""              # Required: project name, session ID(s), file path(s), or descriptive phrase
  session_file: ""        # Deprecated: backward-compatible alias for source (single file path)
  style: "superhero"      # 28 styles: manga, superhero, indie, newspaper, ligne-claire, retro-americana, sin-city, watchmen, berserk, cuphead, ghibli, attack-on-titan, spider-man, x-men, solo-leveling, gundam, transformers, tatsunoko, witchblade, dylan-dog, tex-willer, disney-classic, bendy, hellraiser, naruto, jujutsu-kaisen, one-piece, go-nagai — or any custom description
  output_name: ""         # Optional: custom output filename (defaults to comic-{timestamp})
  project_name: ""        # Optional: project name (defaults to "comic-project")
  issue_title: ""         # Optional: issue title (defaults to comic title from research)
  saga_issue: ""          # Optional: saga issue number (2, 3, ...). Empty = issue 1 or standalone.
  previous_issue_id: ""   # Optional: issue ID of previous saga issue (for continuity).
  max_characters: ""      # Optional: max characters to design (default 5-6). User can steer e.g. "3" or "8".
  max_pages: ""           # Optional: max story pages per issue (default 5). Increase for epic arcs.
  panels_per_page: ""     # Optional: panels per page range (default "3-6"). Use "2-4" for cinematic, "4-6" for dense.
  max_issues: "5"         # Optional: max issues in a saga (default 5). Controls how many issues the saga planner creates.
  story_hints: ""         # Optional: creative direction for the narrative (e.g. "emphasize the human feedback loop", "focus on the collaboration between agents", "make it feel like an underdog victory story")
  character_hints: ""     # Optional: creative direction for character design (e.g. "make the protagonist look battle-worn", "give characters expressive body language", "emphasize team uniforms")
  content_policy_notes: "" # Accumulated moderation lessons — populated at runtime when image generation hits content policy blocks. Visible to all art-generation agents so they preemptively avoid blocked patterns.

stages:
  # ==========================================================================
  # STAGE 1: RESEARCH & STORYBOARD
  # Cheap text-only steps: extract data, curate style, write storyboard.
  # Approval gate at the end lets the user review character cast and narrative
  # arc before committing to expensive image generation.
  # ==========================================================================
  - name: "research-and-storyboard"
    steps:
      # ============================================
      # STEP 0: INIT PROJECT - Asset Manager Setup
      # ============================================
      - id: "init-project"
        agent: "comic-strips:style-curator"
        prompt: |
          YOUR ONLY JOB: Create a project and a placeholder first issue, then return the result as JSON. Do NOTHING else.

          comic_project(action='create_issue', project='{{project_name}}', title='{{issue_title}}', metadata={"source": "{{source}}", "session_file": "{{session_file}}", "style": "{{style}}", "created_by": "session-to-comic recipe v8.0.0", "max_issues": "{{max_issues}}"})

          If project_name is empty, use "comic-project". If issue_title is empty, use "Saga Planning".

          Return ONLY the JSON from the tool response: {"project_id": "<value>", "issue_id": "<value>"}
          Do NOT read files, do NOT curate styles, do NOT do anything else. Just call the tool and return.
        output: "project_init"
        parse_json: true
        timeout: 120  # init-project: single tool call + return

      # ============================================
      # STEP 0a: DISCOVER SESSIONS - Source Resolution
      # Translates the user's flexible {{source}} input
      # (project name, session IDs, file paths, or
      # descriptive phrase) into consolidated session data.
      # The researcher discovers data using its native tools
      # — not hardcoded paths.
      # ============================================
      - id: "discover-sessions"
        agent: "stories:story-researcher"
        prompt: |
          You are given a source describing what to research: {{source}}
          Legacy session file (if provided): {{session_file}}

          If source is provided, use it. If source is empty but session_file is provided, use session_file instead.
          If BOTH are empty, STOP and return an error: {"error": "No source or session_file provided. One is required."}

          The source could be any of these — inspect the string and figure out which:
          - A project name (e.g. "comic-strip-bundle")
          - A directory path to a project
          - A single session file path (e.g. path/to/events.jsonl)
          - A session ID or comma-separated list of session IDs
          - A descriptive phrase (e.g. "the context-intelligence project")

          YOUR JOB: Discover and gather the relevant Amplifier session data — agent activity,
          tool usage, key moments, outcomes, and metrics. Use your tools freely: bash (git log,
          gh CLI, find, ls), grep, read_file, and delegation to foundation:explorer for deep
          exploration. Synthesize across multiple sessions if the source spans more than one.

          DO NOT extract comic-specific structures (characters, panel moments, narrative arcs).
          That is the research step's job. You are purely "find the data and consolidate it."

          SMART PROJECT NAMING: If the project_name is empty or equal to "comic-project" (the default),
          propose a meaningful project name based on the content you discovered. Analyze the session
          themes, project names, repository names, or key topics to craft a short, descriptive slug
          (e.g. "context-intelligence-saga", "auth-refactor-chronicles"). Store your suggestion under
          a "suggested_project_name" field in the research output. If the user already provided a
          meaningful project_name (i.e. not empty and not "comic-project"), skip this step.

          Store the consolidated research material using:
          comic_asset(action='store', project='{{project_init.project_id}}', issue='{{project_init.issue_id}}', type='research', name='session-discovery', content=<your consolidated session data>)

          Return ONLY the URI string from the store response. Your entire output should be just the URI, e.g.:
          comic://my-project/issues/issue-001/research/session-discovery?v=1
        output: "session_data"
        timeout: 1800  # discover-sessions: exploration + consolidation (large projects may take 15-20 min)

      # ============================================
      # STEP 1: RESEARCH - Data Extraction
      # ============================================
      - id: "research"
        agent: "stories:story-researcher"
        prompt: |
          Analyze the session data at: {{session_data}}

          Load the consolidated session data:
          comic_asset(action='get', uri='{{session_data}}', include='full')

          Extract structured data for comic strip creation:

          **Session Metadata:**
          - Session ID, duration, date
          - Agents used and their roles
          - Tools called and frequency
          - Number of user interactions

          **Agent Activity Analysis (CRITICAL for character selection):**
          - Rank each agent by activity level: count tool calls, delegations sent, delegations received
          - Identify which bundle each agent belongs to (e.g., foundation:explorer -> foundation bundle)
          - Map bundle memberships so the storyboard writer can assign team affiliations
          - Flag the top 3-4 most active agents and note their key contributions

          **Key Moments (for comic panels):**
          - The initial challenge or goal (what started the session?)
          - Breakthrough moments (problems solved, discoveries made)
          - Agent collaboration highlights (which agents worked together?)
          - The final outcome or deliverable
          - Any dramatic failures or unexpected turns

          **Characters:**
          - Map each agent to a character with a brief visual description
          - Identify the "protagonist" (main agent driving the story)
          - Identify any "antagonists" (bugs, errors, blockers)

          **Metrics:**
          - Quantified achievements (files created, tests passed, etc.)
          - Session duration and effort indicators

          Produce structured JSON with: title, subtitle, timeline, key_moments, characters, metrics, outcome.

          Project tracking: project_id={{project_init.project_id}}, issue_id={{project_init.issue_id}}

          Store the research JSON using:
          comic_asset(action='store', project='{{project_init.project_id}}', issue='{{project_init.issue_id}}', type='research', name='session-analysis', content=<your structured research JSON>)

          Then return ONLY the URI string from the store response. Do not return the full research content.
          Your entire output should be just the URI string, e.g.:
          comic://e2e-real-test/issues/issue-001/research/session-analysis?v=1
        output: "research_data"
        timeout: 900  # research: session analysis + store asset (~8-12 min for large sessions)

      # ============================================
      # STEP 2: STYLE CURATION
      # ============================================
      - id: "style-curation"
        agent: "comic-strips:style-curator"
        prompt: |
          Define the visual style for this comic strip.

          Style requested: {{style}}

          If "{{style}}" matches a predefined style name (manga, superhero, indie, newspaper, ligne-claire, retro-americana), load the corresponding style pack and adapt it for this specific story.

          If it's a custom description, interpret it and generate a complete style guide.

          Project tracking: project_id={{project_init.project_id}}, issue_id={{project_init.issue_id}}, style={{style}}
          Store the completed style guide using:
          comic_style(action='store', project='{{project_init.project_id}}', issue='{{project_init.issue_id}}', name='{{style}}', definition=<your style guide output>)

          Return ONLY the style URI from the comic_style response (e.g., "comic://proj/styles/manga").
          Do NOT return the full style guide text — just the URI string.
          Downstream agents will load the style guide content via comic_style(action='get', uri=<uri>) when needed.
        output: "style_guide"
        timeout: 300  # style-curation: load style pack + store (~2-3 min)

      # ============================================
      # STEP 3: SAGA STORYBOARD
      # ============================================
      - id: "storyboard"
        agent: "comic-strips:storyboard-writer"
        prompt: |
          Create a multi-issue saga storyboard from the session research data.

          Research Data URI: {{research_data}}
          Load the research data:
          comic_asset(action='get', uri='{{research_data}}', include='full')

          Style Guide URI: {{style_guide}}
          Load the style guide content using: comic_style(action='get', uri='{{style_guide}}')

          IMPORTANT: You are a TWO-PHASE agent.

          **Phase 1 — Delegate Narrative Creation:**
          First, delegate to stories:content-strategist with the research data to select
          the best narrative arc (problem/solution/impact, journey/discovery, etc.).
          Then delegate to stories:case-study-writer with the arc and research data to
          generate Challenge → Approach → Results narrative prose.

          **Story Hints from User (apply these throughout):**
          {{story_hints}}
          If story_hints is non-empty, weave these creative directions into BOTH phases:
          - In Phase 1: pass them to the stories agents as tone/emphasis guidance
          - In Phase 2: use them to guide which moments get panels, which characters get focus,
            and what emotional beats are emphasized. Hints like "emphasize human feedback" mean
            more panels showing human-agent interaction. Hints like "underdog story" mean the
            challenge/struggle sections get more dramatic weight.

          **Phase 2 — Translate Narrative into Multi-Issue Saga:**
          Take the narrative prose from Phase 1 and translate it into a multi-issue saga plan.

          **Cross-Project Character Discovery:**
          Before creating new characters, search for existing characters in the same style:
          comic_character(action='search', style='{{style}}')
          Reuse existing characters where they match agents/roles from the research data.
          For reused characters, set `existing_uri` to their comic:// URI and `needs_redesign`
          to false (or true if the style has changed significantly).

          **Smart Project Naming:**
          If the project_name is empty or equal to "comic-project", propose a meaningful
          project name based on the narrative content. Store as `suggested_project_name`
          in the output JSON.

          **MANDATORY: Call list_layouts before assigning any page layouts.**
          comic_create(action='list_layouts')
          All layout IDs in page_layouts MUST come from the list_layouts response.
          Do NOT invent layout names. Invalid layout IDs will cause the pipeline to fail.

          **SAGA BUDGET (defaults — user can override via recipe params):**
          - max_issues: {{max_issues}} (default: 5 if empty. Total issues in the saga.)
          - max_characters: {{max_characters}} (default: 5-6 if empty. 4 main + 1-2 supporting.)
          - max_pages: {{max_pages}} (default: 5 if empty). Per issue, plus 1 cover + 1 cast page.
          - panels_per_page: {{panels_per_page}} (default: 3-6 if empty. Some pages can use 2 for big dramatic moments.)

          **SAGA PLANNING RULES:**
          - Each issue must have a self-contained arc (beginning, middle, cliffhanger or resolution).
          - Issues 2+ must open with a brief recap of the previous issue's cliffhanger.
          - Maintain a shared character roster across all issues — the same characters persist.
          - Plan character evolution across issues: characters grow, change, gain scars or
            new abilities as the saga progresses. Track this in the per_issue field of
            each character_roster entry.
          - The final issue resolves the overarching saga arc.

          All dialogue must be natural, dramatized character speech. NO raw session data
          (UUIDs, file paths, file sizes, token counts, raw error messages) in speech bubbles.
          Use caption boxes for factual anchors. Technical events become visual metaphors.

          Set page breaks every 2-3 panels, after dramatic beats.

          CRITICAL OUTPUT REQUIREMENT — Your JSON output MUST include these top-level fields:

          {
            "title": "<saga title>",
            "subtitle": "<saga subtitle>",
            "suggested_project_name": "<slug if project_name was empty/default, else omit>",
            "saga_plan": {
              "total_issues": <integer>,
              "arc_summary": "<one-paragraph overview of the full saga arc>",
              "issues": [
                {
                  "issue_number": 1,
                  "title": "<issue title>",
                  "character_list": [ ... ],
                  "panel_list": [ ... ],
                  "page_layouts": [ {"page": 1, "layout": "<valid layout_id>", "panel_count": <n>} ],
                  "page_count": <integer>,
                  "panel_count": <integer>,
                  "cliffhanger": "<how this issue ends — teaser for next>",
                  "recap": null
                },
                {
                  "issue_number": 2,
                  "title": "<issue title>",
                  "character_list": [ ... ],
                  "panel_list": [ ... ],
                  "page_layouts": [ ... ],
                  "page_count": <integer>,
                  "panel_count": <integer>,
                  "cliffhanger": "<cliffhanger or null for final issue>",
                  "recap": "<recap of issue 1 ending>"
                }
              ]
            },
            "character_roster": [
              {
                "name": "<display name>",
                "char_slug": "<url-safe slug>",
                "role": "<protagonist | antagonist | supporting | cameo>",
                "type": "<agent | human | concept | system>",
                "bundle": "<originating bundle, e.g. foundation>",
                "first_appearance": "issue-001",
                "existing_uri": "<comic:// URI if reused from another project, else null>",
                "needs_redesign": false,
                "visual_traits": "<key visual identifiers — outfit, colors, props>",
                "description": "<character personality and narrative role>",
                "backstory": "<character origin — what agent/concept inspired them>",
                "metadata": { "agent_name": "...", "activity_rank": 1 },
                "per_issue": {
                  "issue-001": { "arc_role": "intro", "costume_variant": null, "notes": "..." },
                  "issue-002": { "arc_role": "growth", "costume_variant": "battle-worn", "notes": "..." }
                }
              }
            ]
          }

          The saga_plan.issues[] array drives downstream per-issue processing.
          Each issue's character_list and panel_list are used by foreach loops for
          character design and panel art generation. page_layouts is validated by a
          downstream step — invalid layout IDs will cause the pipeline to fail.
          The character_roster[] provides the shared roster with per_issue evolution maps.

          Output the complete saga plan as structured JSON.

          Project tracking: project_id={{project_init.project_id}}, issue_id={{project_init.issue_id}}
          After producing the saga storyboard JSON, store it using:
          comic_asset(action='store', project='{{project_init.project_id}}', issue='{{project_init.issue_id}}', type='storyboard', name='storyboard', content=<your saga storyboard output>)
        output: "storyboard"
        parse_json: true
        timeout: 1800  # saga storyboard: delegates to 2 stories agents + saga JSON production (~12-20 min)

      # ============================================
      # STEP 3a: VALIDATE STORYBOARD LAYOUTS (ALL SAGA ISSUES)
      # Deterministic check — catches invalid layout IDs BEFORE the
      # approval gate and BEFORE expensive image generation starts.
      # Validates layouts across ALL issues in the saga plan, not just
      # a single issue. Combines page_layouts from every issue and
      # checks them in one validate_storyboard call.
      # ============================================
      - id: "validate-storyboard"
        agent: "comic-strips:style-curator"
        prompt: |
          YOUR ONLY JOB: Validate the storyboard page layouts across ALL saga issues. Do NOTHING else.

          Saga issues from the storyboard:
          {{storyboard.saga_plan.issues}}

          For each issue in the list above, extract its page_layouts array.
          Combine ALL page_layouts from ALL issues into a single flat array.

          Call: comic_create(action='validate_storyboard', page_layouts=<combined page_layouts from all issues>)

          If validation PASSED, return ONLY: {"validation": "PASSED", "total_issues": <number of issues>, "total_pages": <sum of all pages across all issues>}
          If validation FAILED, return: {"validation": "FAILED", "invalid_layout_ids": <from tool>, "suggestions": <from tool>, "failed_issues": <list of issue numbers with invalid layouts>}
        output: "storyboard_validation"
        parse_json: true
        timeout: 120

      # ============================================
      # STEP 3b: CREATE/UPDATE SAGA ISSUES
      # Iterate over the saga plan's issues array. Issue #1 updates the
      # placeholder issue created during init; issues #2+ create new ones.
      # Each iteration returns {issue_id, issue_number, title} collected
      # into saga_issues for downstream per-issue processing.
      # ============================================
      - id: "create-issues"
        foreach: "{{storyboard.saga_plan.issues}}"
        as: saga_issue
        agent: "comic-strips:style-curator"
        max_iterations: 20
        prompt: |
          YOUR ONLY JOB: Create or update a single saga issue in the project. Do NOTHING else.

          Current saga issue to process:
          {{saga_issue}}

          Saga metadata:
          - Saga title: {{storyboard.title}}
          - Style: {{style}}

          RULES — read the issue_number from the saga_issue object above, then:

          IF issue_number == 1 (first issue):
            This issue was already created during project init. UPDATE it with saga metadata:
            comic_project(action='update_issue', project='{{project_init.project_id}}', issue='{{project_init.issue_id}}', title=saga_issue.title, metadata={"saga_issue_number": 1, "saga_title": "{{storyboard.title}}", "style": "{{style}}", "created_by": "session-to-comic recipe v8.0.0"})

            Return ONLY: {"issue_id": "{{project_init.issue_id}}", "issue_number": 1, "title": "<title from saga_issue>"}

          IF issue_number >= 2 (subsequent issues):
            Create a NEW issue for this saga entry:
            comic_project(action='create_issue', project='{{project_init.project_id}}', title=saga_issue.title, metadata={"saga_issue_number": saga_issue.issue_number, "saga_title": "{{storyboard.title}}", "style": "{{style}}", "created_by": "session-to-comic recipe v8.0.0"})

            Return ONLY: {"issue_id": "<issue_id from tool response>", "issue_number": <saga_issue.issue_number>, "title": "<title from saga_issue>"}

          Return valid JSON with exactly these three fields: issue_id, issue_number, title.
        collect: "saga_issues"
        parse_json: true
        timeout: 120

    # ------------------------------------------------------------------
    # APPROVAL GATE: Storyboard Review
    # This is the last cheap checkpoint before expensive image generation.
    # The user can review the character cast and narrative arc, then
    # approve to proceed or deny to stop and revise.
    # ------------------------------------------------------------------
    approval:
      required: true
      prompt: |
        Saga storyboard complete. Please review before approving expensive image generation.

        Saga title: {{storyboard.title}}
        Subtitle: {{storyboard.subtitle}}
        Total issues: {{storyboard.saga_plan.total_issues}}
        Max issues budget: {{max_issues}}

        Arc summary:
        {{storyboard.saga_plan.arc_summary}}

        Layout validation: {{storyboard_validation.validation}}

        All planned issues:
        {{storyboard.saga_plan.issues}}

        Character roster:
        {{storyboard.character_roster}}

        Created issues:
        {{saga_issues}}

        If layout validation FAILED, DENY and fix the storyboard layouts.
        Otherwise, approve to proceed with character design and per-issue art generation.
      timeout: 0
      default: "deny"

  # ==========================================================================
  # STAGE 2: CHARACTER DESIGN
  # Design character reference sheets from the shared roster. Handles three
  # workflows: reuse existing character, redesign with style update, or
  # create new character from scratch. Per-issue variants are generated
  # when the character roster indicates variant needs.
  # ==========================================================================
  - name: "character-design"
    steps:
      # ============================================
      # STEP 4: CHARACTER DESIGN - Reference Sheets (foreach per character)
      # Iterates over the shared character_roster (not per-issue character_list).
      # Each character is designed once at the project level, then per-issue
      # variants are created as needed.
      # ============================================
      - id: "design-characters"
        foreach: "{{storyboard.character_roster}}"
        as: character_item
        agent: "comic-strips:character-designer"
        parallel: 2
        max_iterations: 20
        retry:
          max_attempts: 2
          initial_delay: 5
        prompt: |
          Project tracking: project_id={{project_init.project_id}}, issue_id={{project_init.issue_id}}, style={{style}}

          Design a character reference sheet for this single character using comic_create.

          Character to design:
          {{character_item}}

          Style Guide URI: {{style_guide}}
          Load the style guide using: comic_style(action='get', uri='{{style_guide}}')

          Character Hints from User (apply to visual design):
          {{character_hints}}
          If character_hints is non-empty, weave these creative directions into the character's
          visual design, personality expression, and style interpretation. For example, hints like
          "battle-worn appearance" should influence clothing details and expression; hints like
          "expressive body language" should influence the reference pose.

          STYLE COHESION (CRITICAL): All characters in this issue MUST share the same visual DNA
          from the style guide's Character Rendering section. Load the style guide and extract the
          character rendering rules. Every character prompt MUST include these shared traits
          (e.g., for Ghibli: round open faces, large expressive eyes, naturalistic proportions,
          watercolor rendering). Characters that don't match the style's visual DNA will look
          like they're from different comics — this is a FAILURE.

          Design this character with bundle-affiliation visual markers — characters from the
          same bundle share team colors, insignia, or uniform elements.

          THREE WORKFLOWS — read the character_item fields and choose ONE:

          WORKFLOW A — REUSE EXISTING CHARACTER:
          If character_item.existing_uri is non-null AND character_item.needs_redesign is false,
          this character already has a design from a previous project. Skip generation entirely.
          Return the existing_uri as-is — no image generation needed.

          WORKFLOW B — REDESIGN WITH STYLE UPDATE:
          If character_item.existing_uri is non-null AND character_item.needs_redesign is true,
          the character exists but needs a style refresh. Load the existing design:
          comic_asset(action='get', uri=character_item.existing_uri)
          Then create a NEW reference sheet that preserves the character's identity (key visual
          traits, silhouette, distinguishing features) while updating the rendering style to
          match the current style guide. Call comic_create with the existing design as reference.

          WORKFLOW C — CREATE NEW CHARACTER:
          If character_item.existing_uri is null, this is a brand new character. Create a full
          reference sheet from scratch based on the character_item fields.

          Call:
          comic_create(action='create_character_ref',
                       project='{{project_init.project_id}}',
                       issue='{{project_init.issue_id}}',
                       name=<character_item.char_slug>,
                       visual_traits=<visual_traits from character_item>,
                       distinctive_features=<identifying features from character_item>,
                       personality=<description from character_item>,
                       metadata=<metadata dict from character_item if present>,
                       prompt=<generation prompt combining visual_traits, style, and bundle affiliation>)

          PER-ISSUE VARIANTS:
          After creating the base design, check character_item.per_issue for entries where
          needs_new_variant is true (e.g., a battle-worn costume in issue 3, or a power-up
          transformation). For each such variant, generate an additional reference sheet:
          comic_create(action='create_character_ref',
                       project='{{project_init.project_id}}',
                       issue=<issue_id for that variant>,
                       name=<char_slug>-<issue_slug>,
                       visual_traits=<base traits + variant costume_variant notes>,
                       prompt=<variant prompt referencing base design + per_issue changes>)

          Return ONLY the base character URI string from the comic_create response
          (e.g., "comic://proj/characters/the-explorer").
          Do NOT return JSON objects, image paths, or base64 data.
        collect: "character_uris"
        timeout: 600  # per character: generate + store + optional variants (~3-5 min each)

  # ==========================================================================
  # STAGE 3: PER-ISSUE ART GENERATION
  # Iterate over each issue in the saga plan, invoking the issue-art.yaml
  # sub-recipe for each. Each sub-recipe execution generates panels, cover,
  # and assembles the final comic strip HTML for one issue.
  # on_error: continue ensures that a failure in one issue does not block
  # the remaining issues from being generated.
  # ==========================================================================
  - name: "per-issue-art"
    steps:
      # ============================================
      # STEP 5: PER-ISSUE ART — Sub-recipe invocation (foreach per issue)
      # Each iteration spawns a full issue-art.yaml execution for one issue,
      # passing in the issue storyboard, character URIs, style, and saga
      # context. Results are collected into issue_results.
      # ============================================
      - id: "generate-issues"
        foreach: "{{storyboard.saga_plan.issues}}"
        as: current_issue
        type: recipe
        recipe: "@comic-strips:recipes/issue-art.yaml"
        on_error: continue
        max_iterations: 20
        timeout: 7200  # per issue: panels + cover + composition (~60-120 min each)
        context:
          project_id: "{{project_init.project_id}}"
          issue_id: "{{current_issue.issue_id}}"
          issue_number: "{{current_issue.issue_number}}"
          issue_storyboard: "{{current_issue}}"
          character_uris: "{{character_uris}}"
          style_uri: "{{style_guide}}"
          style: "{{style}}"
          output_name: "{{output_name}}-issue-{{current_issue.issue_number}}"
          saga_context: "{{storyboard.saga_plan}}"
          content_policy_notes: "{{content_policy_notes}}"
        collect: "issue_results"
